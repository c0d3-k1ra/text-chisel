[package]
name = "text-chisel"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
arboard = "3.6.1"
dotenvy = "0.15.7"
eframe = "0.34.1"
egui = "0.34.1"
enigo = "0.6.1"
global-hotkey = "0.7.0"
reqwest = { version = "0.13.3", features = ["json"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.44", features = ["rt-multi-thread", "macros"] }

[dev-dependencies]
assert_cmd = "2.2.1"
predicates = "3.1.4"
