<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1e1e1e;
    color: #e0e0e0;
    padding: 20px 24px;
    font-size: 13px;
    user-select: none;
    overflow: hidden;
  }
  h1 { font-size: 15px; font-weight: 600; margin-bottom: 20px; color: #fff; }
  .field { margin-bottom: 16px; }
  label { display: block; margin-bottom: 6px; color: #999; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
  input, select {
    width: 100%;
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    color: #e0e0e0;
    padding: 8px 10px;
    font-size: 13px;
    outline: none;
    font-family: inherit;
  }
  input:focus, select:focus { border-color: #555; }
  textarea {
    width: 100%;
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    color: #e0e0e0;
    padding: 8px 10px;
    font-size: 13px;
    outline: none;
    font-family: monospace;
    resize: none;
    height: 60px;
  }
  textarea:focus { border-color: #555; }
  .actions { display: flex; gap: 8px; margin-top: 24px; justify-content: flex-end; }
  button {
    padding: 7px 16px; border-radius: 6px; font-size: 13px;
    cursor: pointer; border: none; font-family: inherit;
  }
  .cancel { background: #2a2a2a; color: #aaa; border: 1px solid #3a3a3a; }
  .cancel:hover { background: #333; }
  .save { background: #fff; color: #000; font-weight: 500; }
  .save:hover { background: #e8e8e8; }
  .hint { font-size: 11px; color: #555; margin-top: 4px; }
</style>
</head>
<body>
<h1>Settings</h1>

<div class="field">
  <label>Anthropic API Key</label>
  <textarea id="apiKey" placeholder="sk-ant-..." autocomplete="off" spellcheck="false"></textarea>
</div>

<div class="field">
  <label>Model</label>
  <select id="model">
    <option value="claude-haiku-4-5-20251001">Haiku 4.5 — fast</option>
    <option value="claude-sonnet-4-6">Sonnet 4.6 — quality</option>
  </select>
</div>

<div class="actions">
  <button class="cancel" onclick="cancel()">Cancel</button>
  <button class="save" onclick="save()">Save</button>
</div>

<script>
  function init(apiKey, model) {
    document.getElementById('apiKey').value = apiKey.trim();
    document.getElementById('model').value = model;
  }

  function save() {
    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) {
      document.getElementById('apiKey').style.borderColor = '#e05';
      return;
    }
    document.getElementById('apiKey').style.borderColor = '';
    window.ipc.postMessage(JSON.stringify({
      action: 'save',
      apiKey,
      model: document.getElementById('model').value,
    }));
  }

  function cancel() {
    window.ipc.postMessage(JSON.stringify({ action: 'cancel' }));
  }
</script>
</body>
</html>
